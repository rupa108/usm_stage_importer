name: Mein neuer Test-Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 2.7
      uses: actions/setup-python@v5
      with:
        python-version: '2.7'

    - name: Run Unit Tests
      run: |
        python -m unittest discover
