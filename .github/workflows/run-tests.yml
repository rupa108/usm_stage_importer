name: Run Python 2.7 Unit Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    # ubuntu-20.04 wird genutzt, da neuere Versionen Python 2.7 nicht mehr unterstützen
    runs-on: ubuntu-20.04

    steps:
    # 1. Holt deinen Code aus dem Repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Installiert und aktiviert Python 2.7
    - name: Set up Python 2.7
      uses: actions/setup-python@v5
      with:
        python-version: '2.7'

    # 3. Führt deine Unittests exakt wie lokal aus
    - name: Run Unit Tests
      run: |
        python -m unittest discover
